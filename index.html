<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cup n Saucer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#f8f6f2;

font-family:'Inter',sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

color:#2d2d2d;

}

.container{

max-width:800px;

padding:50px;

text-align:center;

animation:fade 1.2s ease;

}

.logo{

width:260px;

margin-bottom:35px;

}

.tagline{

font-size:42px;

font-family:'Playfair Display',serif;

font-weight:700;

line-height:1.3;

margin-bottom:25px;

color:#2f2f2f;

}

.subtitle{

font-size:20px;

color:#777;

margin-bottom:40px;

line-height:1.8;

}

.points{

font-size:22px;

font-weight:500;

line-height:2.2;

color:#8b6b3f;

margin-bottom:50px;

}

.coming{

font-size:18px;

letter-spacing:8px;

text-transform:uppercase;

color:#999;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:768px){

.logo{

width:190px;

}

.tagline{

font-size:30px;

}

.subtitle{

font-size:18px;

}

.points{

font-size:20px;

}

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="tagline">

Your Next Business Breakthrough is Brewing...

</div>

<div class="subtitle">

Our website is currently under preparation.<br><br>

Until then...

</div>

<div class="points">

Let's build brands.<br>

Let's grow businesses.<br>

Let's create impact.

</div>

<div class="coming">

COMING SOON

</div>

</div>

</body>

</html>
